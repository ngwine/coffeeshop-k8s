# ============================================================
# CoffeeShop — Frontend Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: coffeeshop
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: coffeeshop
    component: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
