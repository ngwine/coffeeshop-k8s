# ============================================================
# CoffeeShop — Kubernetes Namespaces
# Separates staging, production, and monitoring environments
# ============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: staging
  labels:
    app.kubernetes.io/part-of: coffeeshop
    environment: staging
---
apiVersion: v1
kind: Namespace
metadata:
  name: production
  labels:
    app.kubernetes.io/part-of: coffeeshop
    environment: production
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/part-of: coffeeshop
    environment: monitoring
