# ============================================================
# CoffeeShop — Secrets (Template)
# 
# ⚠️  DO NOT commit actual secret values to Git!
# Actual values are injected via GitHub Actions Secrets:
#   kubectl create secret generic coffeeshop-secrets \
#     --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
#     --from-literal=CLOUDINARY_URL=${{ secrets.CLOUDINARY_URL }} \
#     -n <namespace>
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: coffeeshop-secrets
  labels:
    app: coffeeshop
type: Opaque
stringData:
  # All values below are placeholders — replaced by CI/CD pipeline
  JWT_SECRET: "placeholder-jwt-secret-key-for-k8s"
  CLOUDINARY_URL: "cloudinary://000000000000000:placeholder@placeholder"
  GOOGLE_CLIENT_ID: "placeholder.apps.googleusercontent.com"
  GOOGLE_CLIENT_SECRET: "placeholder-google-secret"


