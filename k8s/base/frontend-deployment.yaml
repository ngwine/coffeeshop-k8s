# ============================================================
# CoffeeShop — Frontend Deployment
# React SPA served via Nginx with rolling updates
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: coffeeshop
    component: frontend
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: coffeeshop
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: coffeeshop
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: coffeeshop
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/ngwine/coffeeshop-frontend:v1.0.0  # Overridden by CI/CD pipeline
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          # ── Health Checks ──
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          # ── Resource Limits ──
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      imagePullSecrets:
        - name: ghcr-secret
