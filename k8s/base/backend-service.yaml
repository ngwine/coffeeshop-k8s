# ============================================================
# CoffeeShop — Backend Service
# ClusterIP service exposing the backend pods internally
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: coffeeshop
    component: backend
spec:
  type: ClusterIP
  selector:
    app: coffeeshop
    component: backend
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
