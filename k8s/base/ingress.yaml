# ============================================================
# CoffeeShop — Ingress (Traefik — K3s built-in)
# TLS termination via cert-manager + Let's Encrypt
# Routes: / → frontend, /api/ → backend, /ws/ → backend
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coffeeshop-ingress
  labels:
    app: coffeeshop
  annotations:
    # cert-manager integration
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Traefik (built-in K3s ingress controller)
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - coffeeshopk8s.me
        - www.coffeeshopk8s.me
      secretName: coffeeshop-tls-cert    # Auto-created by cert-manager
  rules:
    # ── Main Domain ──
    - host: coffeeshopk8s.me
      http:
        paths:
          # API routes → backend service
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3001
          # WebSocket routes → backend service
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3001
          # Health check endpoint
          - path: /health
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 3001
          # Everything else → frontend service
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    # ── WWW Redirect ──
    - host: www.coffeeshopk8s.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80


