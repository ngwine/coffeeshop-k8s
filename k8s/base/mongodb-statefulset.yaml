# ============================================================
# CoffeeShop — MongoDB StatefulSet
# Persistent storage with stable network identity
# ============================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  labels:
    app: coffeeshop
    component: mongodb
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: coffeeshop
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: coffeeshop
      component: mongodb
  template:
    metadata:
      labels:
        app: coffeeshop
        component: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:6
          ports:
            - containerPort: 27017
              name: mongodb
              protocol: TCP
          env:
            - name: MONGO_INITDB_DATABASE
              value: "CoffeeDB"
          # ── Health Checks ──
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          # ── Resources ──
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          # ── Persistent Volume ──
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
  # ── Volume Claim Template ──
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
