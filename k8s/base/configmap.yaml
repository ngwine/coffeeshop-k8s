# ============================================================
# CoffeeShop — ConfigMap
# Non-sensitive configuration values
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: coffeeshop-config
  labels:
    app: coffeeshop
data:
  # ── App Config ──
  NODE_ENV: "production"
  PORT: "3001"

  # ── MongoDB (internal K8s DNS) ──
  MONGO_URI: "mongodb://mongodb-0.mongodb:27017/CoffeeDB"

  # ── CORS ──
  CORS_ORIGINS: "https://coffeeshopk8s.me,https://www.coffeeshopk8s.me"
  FRONTEND_URL: "https://coffeeshopk8s.me"

  # ── API ──
  API_BASE_URL: "https://coffeeshopk8s.me/api"
  GOOGLE_REDIRECT_URI: "https://coffeeshopk8s.me/api/auth/google/callback"
