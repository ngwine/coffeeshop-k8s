# ============================================================
# CoffeeShop — Staging Overlay
# Lower replicas, fewer resources for cost savings
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

resources:
  - ../../base

labels:
  - pairs:
      environment: staging
    includeSelectors: false

# ── Override replicas for staging ──
replicas:
  - name: backend
    count: 1
  - name: frontend
    count: 1

# ── Patch: reduce resource limits in staging ──
patches:
  # Backend: lower resources
  - target:
      kind: Deployment
      name: backend
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: backend
      spec:
        template:
          spec:
            containers:
              - name: backend
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    cpu: 250m
                    memory: 256Mi

  # Frontend: lower resources
  - target:
      kind: Deployment
      name: frontend
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: frontend
      spec:
        template:
          spec:
            containers:
              - name: frontend
                resources:
                  requests:
                    cpu: 25m
                    memory: 32Mi
                  limits:
                    cpu: 100m
                    memory: 64Mi

  # Disable HPA in staging
  - target:
      kind: HorizontalPodAutoscaler
      name: backend-hpa
    patch: |
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: backend-hpa
      spec:
        minReplicas: 1
        maxReplicas: 2

  - target:
      kind: HorizontalPodAutoscaler
      name: frontend-hpa
    patch: |
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: frontend-hpa
      spec:
        minReplicas: 1
        maxReplicas: 2

  # ConfigMap: staging-specific values
  - target:
      kind: ConfigMap
      name: coffeeshop-config
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: coffeeshop-config
      data:
        CORS_ORIGINS: "https://staging.coffeeshopk8s.me"
        FRONTEND_URL: "https://staging.coffeeshopk8s.me"
        API_BASE_URL: "https://staging.coffeeshopk8s.me/api"
        GOOGLE_REDIRECT_URI: "https://staging.coffeeshopk8s.me/api/auth/google/callback"

  # Patch Ingress hostnames for staging environment
  - target:
      kind: Ingress
      name: coffeeshop-ingress
    patch: |-
      - op: replace
        path: /spec/tls
        value:
          - hosts:
              - staging.coffeeshopk8s.me
            secretName: coffeeshop-staging-tls-cert
      - op: replace
        path: /spec/rules
        value:
          - host: staging.coffeeshopk8s.me
            http:
              paths:
                - path: /api
                  pathType: Prefix
                  backend:
                    service:
                      name: backend
                      port:
                        number: 3001
                - path: /ws
                  pathType: Prefix
                  backend:
                    service:
                      name: backend
                      port:
                        number: 3001
                - path: /health
                  pathType: Exact
                  backend:
                    service:
                      name: backend
                      port:
                        number: 3001
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: frontend
                      port:
                        number: 80



