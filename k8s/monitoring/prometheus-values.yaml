# ============================================================
# CoffeeShop — Prometheus Stack Helm Values
# Used with: helm install monitoring prometheus-community/kube-prometheus-stack
# ============================================================

# ── Prometheus Configuration ──
prometheus:
  prometheusSpec:
    # Resource limits (fit within free tier)
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # Data retention
    retention: 7d
    retentionSize: "5GB"

    # Scrape interval
    scrapeInterval: 15s
    evaluationInterval: 15s

    # Storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    # Scrape application metrics
    additionalScrapeConfigs:
      - job_name: "coffeeshop-backend"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - production
                - staging
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_component]
            regex: backend
            action: keep
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

# ── Grafana Configuration ──
grafana:
  enabled: true

  # Admin credentials (change in production!)
  adminUser: admin
  adminPassword: CoffeeShop2024!

  # Resource limits
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  # Ingress (accessible via grafana.yourdomain.com)
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - grafana.coffeeshopk8s.me
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.coffeeshopk8s.me

  # Default dashboards
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: Asia/Ho_Chi_Minh

  # Persistence
  persistence:
    enabled: true
    size: 2Gi

  # Sidecar for auto-loading dashboards
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      searchNamespace: monitoring

  # Data sources
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://monitoring-prometheus:9090
          access: proxy
          isDefault: true

# ── Alertmanager Configuration ──
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  # Alert routing
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "default"
      routes:
        - match:
            severity: critical
          receiver: "critical-alerts"
          repeat_interval: 1h
    receivers:
      - name: "default"
        # Add webhook/email/slack integrations here
      - name: "critical-alerts"
        # Add webhook/email/slack integrations here

# ── Node Exporter (system metrics) ──
nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# ── kube-state-metrics ──
kubeStateMetrics:
  enabled: true

# ── Additional PrometheusRules ──
additionalPrometheusRulesMap:
  coffeeshop-alerts:
    groups:
      - name: coffeeshop.rules
        rules:
          # Pod restart alert
          - alert: PodRestartingTooOften
            expr: increase(kube_pod_container_status_restarts_total{namespace=~"production|staging"}[1h]) > 3
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} is restarting frequently"
              description: "Pod {{ $labels.pod }} in {{ $labels.namespace }} has restarted {{ $value }} times in the last hour"

          # High CPU alert
          - alert: HighCPUUsage
            expr: (sum(rate(container_cpu_usage_seconds_total{namespace="production"}[5m])) by (pod) / sum(kube_pod_container_resource_limits{namespace="production", resource="cpu"}) by (pod)) > 0.9
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High CPU usage on {{ $labels.pod }}"
              description: "Pod {{ $labels.pod }} CPU usage is above 90% for 10 minutes"

          # High Memory alert
          - alert: HighMemoryUsage
            expr: (sum(container_memory_working_set_bytes{namespace="production"}) by (pod) / sum(kube_pod_container_resource_limits{namespace="production", resource="memory"}) by (pod)) > 0.85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage on {{ $labels.pod }}"
              description: "Pod {{ $labels.pod }} memory usage is above 85% for 10 minutes"

          # Pod not ready
          - alert: PodNotReady
            expr: kube_pod_status_ready{namespace=~"production|staging", condition="true"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} is not ready"
              description: "Pod {{ $labels.pod }} in {{ $labels.namespace }} has been not ready for 5 minutes"
