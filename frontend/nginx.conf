# frontend/nginx.conf
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Cho React Router: tất cả đường dẫn không phải file tĩnh
    # đều trả về index.html
    location / {
        try_files $uri /index.html;
    }

    # (optional) cache static file build
    location /static/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public";
    }
}
