# ============================================================
# CoffeeShop — CD Pipeline (Continuous Delivery)
# Trigger: After CI succeeds on main
# Flow: Deploy Staging → Manual Approval → Deploy Production
# Runner: Self-hosted (On-Premise Kubernetes via Docker Desktop)
# Extra Credit: 7.2 (Multi-env), 7.3 (Rolling Update), 7.4 (Rollback)
# ============================================================
name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/coffeeshop-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/coffeeshop-frontend

jobs:
  # ══════════════════════════════════════════════════════════
  # Stage 1: Deploy to Staging (Automatic)
  # ══════════════════════════════════════════════════════════
  deploy-staging:
    name: "🚀 Deploy to Staging"
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging
    steps:
      - name: Setup PATH for macOS tools
        run: |
          echo "/usr/local/bin" >> $GITHUB_PATH
          echo "/opt/homebrew/bin" >> $GITHUB_PATH
          echo "/Applications/Docker.app/Contents/Resources/bin" >> $GITHUB_PATH
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get image tag from CI
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "📌 Deploying image tag: ${SHORT_SHA}"

      # ── Verify kubectl connection ──
      - name: Verify K8s cluster connection
        run: |
          echo "🔗 Verifying connection to local Kubernetes cluster..."
          kubectl cluster-info
          kubectl get nodes
          echo "✅ Connected to on-premise K8s cluster"

      # ── Ensure namespace exists ──
      - name: Ensure staging namespace
        run: |
          kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -


      # ── Build images locally and load into K8s ──
      - name: Build and load Docker images
        run: |
          # Bypass macOS Keychain (not accessible in service mode)
          export DOCKER_CONFIG=$(mktemp -d)
          echo '{"credsStore":""}' > $DOCKER_CONFIG/config.json

          echo "🏗️ Building backend image..."
          docker build -t ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }} ./backend

          echo "🏗️ Building frontend image..."
          docker build -t ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }} ./frontend

          echo "✅ Images built and available in local Docker (shared with K8s)"

      # ── Deploy with Kustomize ──
      - name: Deploy to staging namespace
        run: |
          # Update image tags in deployment
          cd k8s/overlays/staging
          kustomize edit set image \
            ghcr.io/OWNER/coffeeshop-backend=${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }} \
            ghcr.io/OWNER/coffeeshop-frontend=${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }}

          # Apply manifests
          kustomize build . | kubectl apply -f -

      # ── Wait for rollout ──
      - name: Wait for staging rollout
        run: |
          echo "⏳ Waiting for backend rollout..."
          kubectl rollout status deployment/backend -n staging --timeout=180s

          echo "⏳ Waiting for frontend rollout..."
          kubectl rollout status deployment/frontend -n staging --timeout=180s

      # ── Health Check ──
      - name: Run health check (staging)
        run: |
          chmod +x scripts/health-check.sh
          # Use kubectl port-forward for local health check
          kubectl port-forward svc/backend 13001:3001 -n staging &
          PF_PID=$!
          sleep 5
          ./scripts/health-check.sh staging || true
          kill $PF_PID 2>/dev/null || true
        env:
          HEALTH_URL: http://localhost:13001/health

      - name: Staging deployment summary
        run: |
          echo "## ✅ Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag:** \`${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Namespace:** staging" >> $GITHUB_STEP_SUMMARY
          echo "- **Infrastructure:** On-Premise (Self-hosted Runner)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pods" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n staging -o wide >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════
  # Stage 2: Manual Approval Gate (Extra Credit 7.2)
  # ══════════════════════════════════════════════════════════
  approval-gate:
    name: "🔐 Production Approval"
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment: production    # ← Requires manual approval in GitHub settings
    steps:
      - name: Approval granted
        run: |
          echo "✅ Production deployment approved by: ${{ github.actor }}"
          echo "🕐 Approved at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

  # ══════════════════════════════════════════════════════════
  # Stage 3: Deploy to Production (After Approval)
  # Extra Credit: 7.3 (Rolling Update) + 7.4 (Auto Rollback)
  # ══════════════════════════════════════════════════════════
  deploy-production:
    name: "🚀 Deploy to Production"
    runs-on: self-hosted
    needs: [approval-gate]
    environment: production
    steps:
      - name: Setup PATH for macOS tools
        run: |
          echo "/usr/local/bin" >> $GITHUB_PATH
          echo "/opt/homebrew/bin" >> $GITHUB_PATH
          echo "/Applications/Docker.app/Contents/Resources/bin" >> $GITHUB_PATH
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Verify K8s cluster connection
        run: |
          kubectl cluster-info
          kubectl get nodes

      # ── Ensure namespace exists ──
      - name: Ensure production namespace
        run: |
          kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -


      # ── Build images locally ──
      - name: Build Docker images
        run: |
          # Bypass macOS Keychain (not accessible in service mode)
          export DOCKER_CONFIG=$(mktemp -d)
          echo '{"credsStore":""}' > $DOCKER_CONFIG/config.json

          echo "🏗️ Building backend image..."
          docker build -t ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }} ./backend

          echo "🏗️ Building frontend image..."
          docker build -t ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }} ./frontend

      # ── Record current revision for rollback ──
      - name: Record current revision
        id: pre_deploy
        run: |
          CURRENT_REV=$(kubectl rollout history deployment/backend -n production 2>/dev/null | tail -2 | head -1 | awk '{print $1}' || echo "0")
          echo "revision=${CURRENT_REV}" >> $GITHUB_OUTPUT
          echo "📌 Pre-deploy revision: ${CURRENT_REV}"

      # ── Deploy with Rolling Update (Extra Credit 7.3) ──
      - name: Deploy to production namespace
        run: |
          cd k8s/overlays/production
          kustomize edit set image \
            ghcr.io/OWNER/coffeeshop-backend=${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }} \
            ghcr.io/OWNER/coffeeshop-frontend=${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }}

          kustomize build . | kubectl apply -f -

      # ── Wait for Rolling Update ──
      - name: Wait for production rollout
        id: rollout
        run: |
          echo "⏳ Rolling update in progress..."
          echo "   Strategy: maxSurge=1, maxUnavailable=0 (zero-downtime)"

          if kubectl rollout status deployment/backend -n production --timeout=300s; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ Backend rollout complete"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Backend rollout failed!"
          fi

          kubectl rollout status deployment/frontend -n production --timeout=300s

      # ── Post-Deploy Health Check ──
      - name: Run production health check
        id: health
        run: |
          chmod +x scripts/health-check.sh
          # Use kubectl port-forward for local health check
          kubectl port-forward svc/backend 14001:3001 -n production &
          PF_PID=$!
          sleep 5
          if ./scripts/health-check.sh production; then
            echo "healthy=true" >> $GITHUB_OUTPUT
          else
            echo "healthy=false" >> $GITHUB_OUTPUT
          fi
          kill $PF_PID 2>/dev/null || true
        env:
          HEALTH_URL: http://localhost:14001/health

      # ── Automated Rollback (Extra Credit 7.4) ──
      - name: Auto-rollback on failure
        if: steps.rollout.outputs.status == 'failed' || steps.health.outputs.healthy == 'false'
        run: |
          echo "🔄 ROLLING BACK to previous stable version..."
          chmod +x scripts/rollback.sh
          ./scripts/rollback.sh production

          echo "## ⚠️ Production Rollback Triggered" >> $GITHUB_STEP_SUMMARY
          echo "Health check failed — rolled back to previous revision" >> $GITHUB_STEP_SUMMARY

      # ── Deployment Summary ──
      - name: Production deployment summary
        if: steps.health.outputs.healthy == 'true'
        run: |
          echo "## 🎉 Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`${{ steps.tag.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Strategy | Rolling Update (zero-downtime) |" >> $GITHUB_STEP_SUMMARY
          echo "| Infrastructure | On-Premise (Self-hosted Runner) |" >> $GITHUB_STEP_SUMMARY
          echo "| Health | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Running Pods" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n production -o wide >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
