# ============================================================
# CoffeeShop — CD Pipeline (Continuous Delivery)
# Trigger: After CI succeeds on main
# Flow: Deploy Staging → Manual Approval → Deploy Production
# Target: DigitalOcean K3s Cluster via SSH
# Extra Credit: 7.2 (Multi-env), 7.3 (Rolling Update), 7.4 (Rollback)
# ============================================================
name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/coffeeshop-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/coffeeshop-frontend

jobs:
  # ══════════════════════════════════════════════════════════
  # Stage 1: Deploy to Staging (Automatic)
  # ══════════════════════════════════════════════════════════
  deploy-staging:
    name: "🚀 Deploy to Staging"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get image tag from CI
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "📌 Deploying image tag: ${SHORT_SHA}"

      # ── Setup SSH connection to DigitalOcean server ──
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" | base64 --decode > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Verify server connection
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=10 root@${{ secrets.SERVER_IP }} \
            "echo '✅ Connected to K3s cluster' && kubectl get nodes"
        env:
          KUBECONFIG: /etc/rancher/k3s/k3s.yaml

      # ── Sync source code to server ──
      - name: Sync code to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude '.git' \
            --exclude 'node_modules' \
            ./ root@${{ secrets.SERVER_IP }}:/opt/coffeeshop/

      # ── Build & Deploy to Staging ──
      - name: Build images and deploy to staging
        run: |
          IMAGE_TAG="${{ steps.tag.outputs.tag }}"
          ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_IP }} "\
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml && \
            kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f - && \
            cd /opt/coffeeshop && \
            docker build -t coffeeshop-backend:${IMAGE_TAG} ./backend && \
            docker build -t coffeeshop-frontend:${IMAGE_TAG} ./frontend && \
            docker save coffeeshop-backend:${IMAGE_TAG} | k3s ctr images import - && \
            docker save coffeeshop-frontend:${IMAGE_TAG} | k3s ctr images import - && \
            cd k8s/overlays/staging && \
            kustomize build . | kubectl apply -f - && \
            kubectl set image deployment/backend backend=coffeeshop-backend:${IMAGE_TAG} -n staging && \
            kubectl set image deployment/frontend frontend=coffeeshop-frontend:${IMAGE_TAG} -n staging"

      # ── Wait for rollout ──
      - name: Wait for staging rollout
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_IP }} "\
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml && \
            echo '⏳ Waiting for backend rollout...' && \
            kubectl rollout status deployment/backend -n staging --timeout=180s && \
            echo '⏳ Waiting for frontend rollout...' && \
            kubectl rollout status deployment/frontend -n staging --timeout=180s"

      # ── Health Check ──
      - name: Run health check (staging)
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_IP }} "\
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml && \
            kubectl get pods -n staging && \
            echo '✅ Staging deployment healthy'"

      - name: Staging deployment summary
        run: |
          echo "## ✅ Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag:** \`${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Namespace:** staging" >> $GITHUB_STEP_SUMMARY
          echo "- **Infrastructure:** DigitalOcean K3s Cluster" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════
  # Stage 2: Manual Approval Gate (Extra Credit 7.2)
  # ══════════════════════════════════════════════════════════
  approval-gate:
    name: "🔐 Production Approval"
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment: production    # ← Requires manual approval in GitHub settings
    steps:
      - name: Approval granted
        run: |
          echo "✅ Production deployment approved by: ${{ github.actor }}"
          echo "🕐 Approved at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

  # ══════════════════════════════════════════════════════════
  # Stage 3: Deploy to Production (After Approval)
  # Extra Credit: 7.3 (Rolling Update) + 7.4 (Auto Rollback)
  # ══════════════════════════════════════════════════════════
  deploy-production:
    name: "🚀 Deploy to Production"
    runs-on: ubuntu-latest
    needs: [approval-gate]
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" | base64 --decode > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Verify K3s cluster connection
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_IP }} "\
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml && \
            kubectl cluster-info && kubectl get nodes"

      # ── Sync code ──
      - name: Sync code to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude '.git' \
            --exclude 'node_modules' \
            ./ root@${{ secrets.SERVER_IP }}:/opt/coffeeshop/

      # ── Record current revision for rollback ──
      - name: Record current revision
        id: pre_deploy
        run: |
          CURRENT_REV=$(ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_IP }} "\
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml && \
            kubectl rollout history deployment/backend -n production 2>/dev/null | tail -2 | head -1 | awk '{print \$1}'" || echo "0")
          echo "revision=${CURRENT_REV}" >> $GITHUB_OUTPUT
          echo "📌 Pre-deploy revision: ${CURRENT_REV}"

      # ── Build & Deploy with Rolling Update (Extra Credit 7.3) ──
      - name: Build and deploy to production
        run: |
          IMAGE_TAG="${{ steps.tag.outputs.tag }}"
          ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_IP }} "\
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml && \
            kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f - && \
            cd /opt/coffeeshop && \
            docker build -t coffeeshop-backend:${IMAGE_TAG} ./backend && \
            docker build -t coffeeshop-frontend:${IMAGE_TAG} ./frontend && \
            docker save coffeeshop-backend:${IMAGE_TAG} | k3s ctr images import - && \
            docker save coffeeshop-frontend:${IMAGE_TAG} | k3s ctr images import - && \
            cd k8s/overlays/production && \
            kustomize build . | kubectl apply -f - && \
            kubectl set image deployment/backend backend=coffeeshop-backend:${IMAGE_TAG} -n production && \
            kubectl set image deployment/frontend frontend=coffeeshop-frontend:${IMAGE_TAG} -n production"

      # ── Wait for Rolling Update ──
      - name: Wait for production rollout
        id: rollout
        run: |
          echo "⏳ Rolling update in progress..."
          echo "   Strategy: maxSurge=1, maxUnavailable=0 (zero-downtime)"
          if ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_IP }} "\
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml && \
            kubectl rollout status deployment/backend -n production --timeout=300s && \
            kubectl rollout status deployment/frontend -n production --timeout=300s"; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ Rollout complete"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Rollout failed!"
          fi

      # ── Post-Deploy Health Check ──
      - name: Run production health check
        id: health
        run: |
          sleep 10
          HTTP_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://coffeeshopk8s.me/api/health --connect-timeout 10 --max-time 30 || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "healthy=true" >> $GITHUB_OUTPUT
            echo "✅ Health check PASSED (HTTP $HTTP_STATUS)"
          else
            echo "healthy=false" >> $GITHUB_OUTPUT
            echo "❌ Health check FAILED (HTTP $HTTP_STATUS)"
          fi

      # ── Automated Rollback (Extra Credit 7.4) ──
      - name: Auto-rollback on failure
        if: steps.rollout.outputs.status == 'failed' || steps.health.outputs.healthy == 'false'
        run: |
          echo "🔄 ROLLING BACK to previous stable version..."
          ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_IP }} "\
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml && \
            kubectl rollout undo deployment/backend -n production && \
            kubectl rollout undo deployment/frontend -n production && \
            kubectl rollout status deployment/backend -n production --timeout=120s && \
            kubectl rollout status deployment/frontend -n production --timeout=120s"
          echo "## ⚠️ Production Rollback Triggered" >> $GITHUB_STEP_SUMMARY
          echo "Health check failed — rolled back to previous revision" >> $GITHUB_STEP_SUMMARY

      # ── Deployment Summary ──
      - name: Production deployment summary
        if: steps.health.outputs.healthy == 'true'
        run: |
          echo "## 🎉 Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`${{ steps.tag.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Strategy | Rolling Update (zero-downtime) |" >> $GITHUB_STEP_SUMMARY
          echo "| Domain | https://coffeeshopk8s.me |" >> $GITHUB_STEP_SUMMARY
          echo "| Infrastructure | DigitalOcean K3s Cluster |" >> $GITHUB_STEP_SUMMARY
          echo "| Health | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
