# ============================================================
# CoffeeShop — K3s Single-Node Setup Playbook
# Installs K3s server (control-plane + worker) + Helm
# Idempotent: safe to run multiple times
# ============================================================
---
- name: Common setup for all nodes
  hosts: k3s_cluster
  become: yes
  tasks:
    - name: Update system packages
      apt:
        update_cache: yes
        upgrade: dist
      register: update_result
      changed_when: update_result.changed

    - name: Install required packages
      apt:
        name:
          - curl
          - wget
          - git
          - tar
          - unzip
          - jq
          - python3
          - python3-pip
          - iptables
        state: present


    - name: Open firewall ports for K3s
      ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
      loop:
        - { port: '6443', proto: 'tcp' }       # K8s API
        - { port: '10250', proto: 'tcp' }      # Kubelet
        - { port: '80', proto: 'tcp' }         # HTTP
        - { port: '443', proto: 'tcp' }        # HTTPS
        - { port: '8472', proto: 'udp' }       # VXLAN (Flannel)
        - { port: '51820', proto: 'udp' }      # WireGuard
        - { port: '30000:32767', proto: 'tcp' } # NodePort range

    - name: Enable IP forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        sysctl_set: yes
        state: present
        reload: yes

    - name: Enable bridge-nf-call-iptables
      sysctl:
        name: "{{ item }}"
        value: "1"
        sysctl_set: yes
        state: present
        reload: yes
      loop:
        - net.bridge.bridge-nf-call-iptables
        - net.bridge.bridge-nf-call-ip6tables

# ── K3s Master Node Setup ────────────────────────────────────
- name: Install K3s Server (Master)
  hosts: master
  become: yes
  vars:
    k3s_version: "v1.29.4+k3s1"
  tasks:
    - name: Check if K3s is already installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Install K3s server
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" sh -s - server \
          --write-kubeconfig-mode 644 \
          --tls-san "{{ ansible_host }}" \
          --disable local-storage \
          --node-label "role=master"
      when: not k3s_binary.stat.exists
      register: k3s_install

    - name: Wait for K3s to be ready
      shell: kubectl get nodes --no-headers 2>/dev/null | grep -c "Ready"
      register: k3s_ready
      retries: 30
      delay: 10
      until: k3s_ready.stdout | int >= 1
      changed_when: false

    - name: Get K3s node token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token

    - name: Set K3s token fact
      set_fact:
        k3s_node_token: "{{ k3s_token.content | b64decode | trim }}"

    - name: Get kubeconfig content
      slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig

    - name: Save kubeconfig locally
      local_action:
        module: copy
        content: "{{ kubeconfig.content | b64decode | regex_replace('127.0.0.1', ansible_host) }}"
        dest: "{{ playbook_dir }}/../kubeconfig.yaml"
        mode: "0600"

    - name: Install Helm
      shell: |
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Add Helm repos
      shell: |
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo add jetstack https://charts.jetstack.io
        helm repo update
      changed_when: false

    - name: Install cert-manager CRDs
      shell: kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.crds.yaml
      changed_when: false

    - name: Install cert-manager via Helm
      shell: |
        helm upgrade --install cert-manager jetstack/cert-manager \
          --namespace cert-manager \
          --create-namespace \
          --set installCRDs=false \
          --wait
      register: certmanager_install
      changed_when: "'has been upgraded' in certmanager_install.stdout or 'has been installed' in certmanager_install.stdout"

    - name: Create Let's Encrypt ClusterIssuer
      shell: |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: cert-manager.io/v1
        kind: ClusterIssuer
        metadata:
          name: letsencrypt-prod
        spec:
          acme:
            server: https://acme-v02.api.letsencrypt.org/directory
            email: admin@{{ domain_name | default('coffeeshop.xyz') }}
            privateKeySecretRef:
              name: letsencrypt-prod-key
            solvers:
              - http01:
                  ingress:
                    class: nginx
        EOF
      changed_when: false

    - name: Verify K3s cluster status
      shell: |
        echo "=== Nodes ==="
        kubectl get nodes -o wide
        echo ""
        echo "=== System Pods ==="
        kubectl get pods -n kube-system
        echo ""
        echo "=== cert-manager ==="
        kubectl get pods -n cert-manager
      register: cluster_status
      changed_when: false

    - name: Display cluster status
      debug:
        var: cluster_status.stdout_lines



# ── Verify Full Cluster ──────────────────────────────────────
- name: Verify complete K3s cluster
  hosts: master
  become: yes
  tasks:
    - name: Show all cluster nodes
      shell: kubectl get nodes -o wide
      register: final_nodes
      changed_when: false

    - name: Display final cluster state
      debug:
        var: final_nodes.stdout_lines

    - name: Verify single-node cluster
      assert:
        that:
          - final_nodes.stdout_lines | length >= 2  # header + 1 node
        fail_msg: "Expected 1 node in the cluster!"
        success_msg: "✅ K3s single-node cluster is fully operational!"
